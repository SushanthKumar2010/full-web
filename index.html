<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Password Protected</title>
  <style>
    body {
      background: #f5f7f9;
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #999;
      font-weight: 300;
    }

    .login-box {
      background: #fff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
      text-align: center;
      max-width: 320px;
      width: 100%;
    }

    h2 {
      font-weight: 300;
      color: #999;
      margin-bottom: 20px;
    }

    .password-wrapper {
      position: relative;
      margin-top: 10px;
    }

    input[type="password"],
    input[type="text"] {
      padding: 10px 40px 10px 10px;
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 300;
      color: #666;
      box-sizing: border-box;
    }

    .toggle-icon {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 18px;
      color: #aaa;
      user-select: none;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      font-size: 16px;
      background-color: #0077cc;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 300;
    }

    button:hover {
      background-color: #005fa3;
    }

    .error {
      color: #e74c3c;
      margin-top: 10px;
      font-weight: 300;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Enter Password</h2>
    <div class="password-wrapper">
      <input type="password" id="password" placeholder="Password">
      <span class="toggle-icon" onclick="togglePassword()">👁️</span>
    </div>
    <button onclick="checkPassword()">Submit</button>
    <div id="error" class="error"></div>
  </div>

  <script>
    function checkPassword() {
      const input = document.getElementById("password").value;
      const correctPassword = "teengro@sushanth"; // Change this to your password

      if (input === correctPassword) {
        window.location.href = "index.html"; // Redirect on success
      } else {
        document.getElementById("error").textContent = "Incorrect password. Try again.";
      }
    }

    function togglePassword() {
      const pwdField = document.getElementById("password");
      const icon = document.querySelector(".toggle-icon");
      if (pwdField.type === "password") {
        pwdField.type = "text";
        icon.textContent = "🙈";
      } else {
        pwdField.type = "password";
        icon.textContent = "👁️";
      }
    }
  </script>
</body>
</html>
